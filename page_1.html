<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Carmen Divina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .gold-gradient {
            background: linear-gradient(135deg, #C5A059 0%, #F7E7CE 50%, #C5A059 100%);
        }
        .gallery-card:hover .overlay { opacity: 1; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-stone-200">

    <nav class="p-6 border-b border-stone-800 backdrop-blur-md sticky top-0 z-[100] bg-[#0f0f0f]/90">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl md:text-2xl font-serif font-bold tracking-[0.2em] text-[#C5A059]">
                CARMEN<span class="text-stone-100">DIVINA</span>
            </a>
            <a href="index.html" class="text-xs uppercase tracking-[0.2em] hover:text-[#C5A059] transition border border-stone-700 px-4 py-2">
                Back to Home
            </a>
        </div>
    </nav>

    <header class="py-16 px-6 text-center">
        <span class="text-[#C5A059] uppercase tracking-[0.5em] text-xs mb-4 block">Meet Our Voices</span>
        <h1 class="text-4xl md:text-6xl font-serif text-[#F7E7CE]">The <span class="italic">Choir</span> Members</h1>
        <div class="flex items-center justify-center gap-4 mt-6">
            <div class="w-12 h-px bg-[#C5A059]/30"></div>
            <div class="w-2 h-2 rotate-45 border border-[#C5A059]"></div>
            <div class="w-12 h-px bg-[#C5A059]/30"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            
            <div class="gallery-card group relative bg-stone-900/40 border border-stone-800 overflow-hidden rounded-sm transition-all duration-500 hover:border-[#C5A059]/50">
                <div class="aspect-[3/4] overflow-hidden">
                    <img src="img/liz_keen.jpeg" alt="Member Name" class="w-full h-full object-cover transition duration-700 group-hover:scale-110 grayscale hover:grayscale-0">
                </div>
                <div class="p-5">
                    <h3 class="text-[#F7E7CE] font-serif text-xl tracking-wide">Adeline Saputra</h3>
                    <p class="text-[#C5A059] text-[10px] uppercase tracking-widest mt-1 mb-3">Soprano</p>
                    <p class="text-stone-400 text-sm font-light leading-relaxed">Bergabung sejak 2016, membawa karakter suara yang jernih dan penuh ekspresi.</p>
                </div>
            </div>

            <script>
                // Ini hanya untuk demonstrasi pengulangan card di preview
                const container = document.querySelector('.grid');
                const positions = ["Alto", "Tenor", "Bass", "Soprano"];
                
                for (let i = 2; i <= 13; i++) {
                    const pos = positions[Math.floor(Math.random() * positions.length)];
                    container.innerHTML += `
                    <div class="gallery-card group relative bg-stone-900/40 border border-stone-800 overflow-hidden rounded-sm transition-all duration-500 hover:border-[#C5A059]/50">
                        <div class="aspect-[3/4] overflow-hidden bg-stone-800">
                            <div class="w-full h-full flex items-center justify-center text-stone-700 italic">Photo ${i}</div>
                        </div>
                        <div class="p-5">
                            <h3 class="text-[#F7E7CE] font-serif text-xl tracking-wide">Choir Member ${i}</h3>
                            <p class="text-[#C5A059] text-[10px] uppercase tracking-widest mt-1 mb-3">${pos}</p>
                            <p class="text-stone-400 text-sm font-light leading-relaxed">Kontribusi vokal yang luar biasa dalam perjalanan 10 tahun Carmen Divina.</p>
                        </div>
                    </div>`;
                }
            </script>

        </div>
    </main>

    <footer class="py-12 border-t border-stone-900 text-center">
        <p class="text-stone-600 text-xs tracking-[0.2em] uppercase">© 2026 Carmen Divina. All Rights Reserved.</p>
    </footer>

</body>
</html>
